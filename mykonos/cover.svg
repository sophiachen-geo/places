<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Stylized whitewashed Mykonos town and windmills above the Aegean">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe3f2"/>
      <stop offset="100%" stop-color="#eaf6fb"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6f97"/>
      <stop offset="100%" stop-color="#14304a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="640" cy="120" r="52" fill="#fce9c8" opacity="0.9"/>

  <!-- sea -->
  <rect y="360" width="800" height="140" fill="url(#sea)"/>
  <g fill="#f5efe6" opacity="0.25">
    <path d="M0 392 q40 -12 80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 t80 0 V500 H0 Z"/>
  </g>

  <!-- windmills on the rise -->
  <g fill="#fbf6ec" stroke="#e3d6c0" stroke-width="2">
    <g transform="translate(150,150)">
      <rect x="-24" y="40" width="48" height="120" rx="6"/>
      <path d="M-24 40 h48 l-6 -22 h-36 Z" fill="#c8654a" stroke="none"/>
      <g stroke="#8a7a5f" stroke-width="4">
        <path d="M0 40 L0 -8"/><path d="M0 40 L44 40"/><path d="M0 40 L-44 40"/><path d="M0 40 L0 88"/>
      </g>
    </g>
    <g transform="translate(240,168)">
      <rect x="-20" y="34" width="40" height="102" rx="5"/>
      <path d="M-20 34 h40 l-5 -18 h-30 Z" fill="#c8654a" stroke="none"/>
      <g stroke="#8a7a5f" stroke-width="3">
        <path d="M0 34 L0 -6"/><path d="M0 34 L38 34"/><path d="M0 34 L-38 34"/><path d="M0 34 L0 74"/>
      </g>
    </g>
  </g>

  <!-- cubic white town -->
  <g fill="#fbf6ec" stroke="#e3d6c0" stroke-width="2">
    <rect x="320" y="250" width="90" height="110"/>
    <rect x="405" y="285" width="70" height="75"/>
    <rect x="470" y="240" width="85" height="120"/>
    <rect x="550" y="290" width="70" height="70"/>
    <rect x="615" y="255" width="80" height="105"/>
    <rect x="690" y="300" width="70" height="60"/>
    <rect x="360" y="300" width="34" height="60" fill="#f0e7d6"/>
    <rect x="500" y="290" width="28" height="70" fill="#f0e7d6"/>
  </g>
  <!-- blue domes and doors -->
  <g>
    <path d="M470 240 q42 -46 85 0 Z" fill="#2a6f97"/>
    <rect x="640" y="315" width="16" height="45" fill="#2a6f97"/>
    <rect x="430" y="325" width="14" height="35" fill="#2a6f97"/>
    <rect x="366" y="330" width="10" height="30" fill="#2a6f97"/>
  </g>
</svg>
