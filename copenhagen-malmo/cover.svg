<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Stylized Øresund skyline: Copenhagen waterfront, the Øresund bridge and Malmö's Turning Torso">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe0ef"/>
      <stop offset="55%" stop-color="#7fb6d4"/>
      <stop offset="100%" stop-color="#2a6f97"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6f97"/>
      <stop offset="100%" stop-color="#14304a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="150" cy="120" r="52" fill="#f6e4c4" opacity="0.85"/>

  <!-- water -->
  <rect y="330" width="800" height="170" fill="url(#water)"/>

  <!-- Øresund bridge: pylons + cables + deck across the strait -->
  <g stroke="#0f2740" stroke-width="3" opacity="0.9">
    <line x1="330" y1="330" x2="800" y2="318"/>
    <line x1="330" y1="338" x2="800" y2="326"/>
  </g>
  <g stroke="#0f2740" stroke-width="4" fill="none" opacity="0.85">
    <!-- pylon 1 -->
    <line x1="470" y1="230" x2="470" y2="334"/>
    <line x1="455" y1="230" x2="455" y2="334"/>
    <path d="M455 235 L400 332 M470 235 L530 332 M455 235 L420 332 M470 235 L505 332"/>
    <!-- pylon 2 -->
    <line x1="650" y1="240" x2="650" y2="328"/>
    <line x1="635" y1="240" x2="635" y2="328"/>
    <path d="M635 245 L585 326 M650 245 L705 326 M635 245 L605 326 M650 245 L685 326"/>
  </g>

  <!-- Copenhagen side: CopenHill slope + harbour towers + silo -->
  <g fill="#14304a">
    <!-- CopenHill triangular slope -->
    <polygon points="20,330 250,330 250,205"/>
    <rect x="230" y="150" width="14" height="60"/>
    <!-- harbour towers -->
    <rect x="95" y="245" width="30" height="85"/>
    <rect x="135" y="215" width="26" height="115"/>
    <!-- the silo -->
    <rect x="60" y="262" width="26" height="68" rx="3"/>
  </g>
  <g fill="#2a6f97" opacity="0.55">
    <rect x="95" y="245" width="30" height="85"/>
    <rect x="135" y="215" width="26" height="115"/>
  </g>

  <!-- Malmö side: Turning Torso twisting tower -->
  <g transform="translate(690,150)" fill="#14304a">
    <polygon points="0,0 30,6 26,180 4,180"/>
    <polygon points="2,30 28,33 27,60 3,57" fill="#2a6f97" opacity="0.5"/>
    <polygon points="3,90 27,90 26,120 4,120" fill="#2a6f97" opacity="0.5"/>
  </g>

  <!-- bikes-and-water glints -->
  <g fill="#bfe0ef" opacity="0.5">
    <rect x="40" y="360" width="60" height="3" rx="1.5"/>
    <rect x="180" y="385" width="90" height="3" rx="1.5"/>
    <rect x="520" y="372" width="120" height="3" rx="1.5"/>
  </g>
</svg>
