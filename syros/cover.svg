<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Stylized view of Ano Syros hill town above the Aegean">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6f97"/>
      <stop offset="60%" stop-color="#61a5c2"/>
      <stop offset="100%" stop-color="#a9cfdf"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a6f97"/>
      <stop offset="100%" stop-color="#14304a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#sky)"/>
  <circle cx="650" cy="110" r="46" fill="#f6e7c8" opacity="0.85"/>

  <!-- conical hill of Ano Syros -->
  <path d="M120 430 Q 300 120 430 90 Q 470 120 560 430 Z" fill="#c9bfb0"/>
  <path d="M120 430 Q 300 120 430 90 L 430 430 Z" fill="#bcb1a1" opacity="0.5"/>

  <!-- whitewashed cubic houses stepping up the hill -->
  <g fill="#fbf7f0" stroke="#e3d9c8" stroke-width="1.5">
    <rect x="250" y="360" width="34" height="34"/>
    <rect x="292" y="350" width="30" height="44"/>
    <rect x="330" y="340" width="34" height="54"/>
    <rect x="372" y="352" width="30" height="42"/>
    <rect x="410" y="360" width="34" height="34"/>
    <rect x="284" y="300" width="30" height="34"/>
    <rect x="324" y="286" width="34" height="48"/>
    <rect x="366" y="300" width="30" height="34"/>
    <rect x="330" y="236" width="30" height="34"/>
    <rect x="366" y="230" width="30" height="40"/>
    <rect x="352" y="180" width="30" height="34"/>
  </g>

  <!-- hilltop cathedral (St George) with dome -->
  <g>
    <rect x="386" y="150" width="34" height="34" fill="#fbf7f0" stroke="#e3d9c8" stroke-width="1.5"/>
    <path d="M386 150 L403 132 L420 150 Z" fill="#c1632e"/>
    <line x1="403" y1="132" x2="403" y2="118" stroke="#14304a" stroke-width="2"/>
    <line x1="396" y1="124" x2="410" y2="124" stroke="#14304a" stroke-width="2"/>
  </g>

  <!-- sea -->
  <rect x="0" y="430" width="800" height="70" fill="url(#sea)"/>
  <g stroke="#7fb0c8" stroke-width="2" opacity="0.5">
    <line x1="40" y1="452" x2="120" y2="452"/>
    <line x1="600" y1="466" x2="700" y2="466"/>
    <line x1="500" y1="480" x2="560" y2="480"/>
  </g>
  <!-- small sailing boat -->
  <g transform="translate(150,438)">
    <path d="M-22 12 L22 12 L14 24 L-14 24 Z" fill="#14304a"/>
    <line x1="0" y1="12" x2="0" y2="-20" stroke="#14304a" stroke-width="2"/>
    <path d="M0 -18 L18 8 L0 8 Z" fill="#fbf7f0"/>
  </g>
</svg>
